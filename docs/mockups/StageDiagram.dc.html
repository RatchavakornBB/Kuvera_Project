<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex;align-items:center;width:100%;gap:2px;">
  <sc-for list="{{ segs }}" as="seg" hint-placeholder-count="7">
    <div title="{{ seg.title }}" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:0;">
      <div style="width:100%;height:{{ barHeight }};border-radius:2px;background:{{ seg.bg }};border:{{ seg.border }};"></div>
      <sc-if value="{{ showLabels }}" hint-placeholder-val="{{ false }}">
        <div style="font-size:8.5px;color:{{ seg.labelColor }};text-align:center;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;">{{ seg.short }}</div>
      </sc-if>
    </div>
  </sc-for>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 280, &quot;height&quot;: 40}, &quot;segments&quot;: {&quot;editor&quot;: null, &quot;default&quot;: [], &quot;tsType&quot;: &quot;Array&lt;{name:string,status:'done'|'current'|'future',days?:number}&gt;&quot;}, &quot;variant&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;compact&quot;,&quot;full&quot;], &quot;default&quot;: &quot;compact&quot;, &quot;tsType&quot;: &quot;string&quot;}}">
const STAGE_SHORT = ['Lead','NDA','Sourcing','Valuation','Strategy','Diligence','Closing'];

class Component extends DCLogic {
  renderVals() {
    const segments = this.props.segments || [];
    const variant = this.props.variant || 'compact';
    const showLabels = variant === 'full';
    const barHeight = variant === 'full' ? '7px' : '4px';
    const segs = segments.map((s, i) => {
      let bg = 'transparent', border = '1px solid #2A2B33', labelColor = '#8A8A93';
      if (s.status === 'done') { bg = '#2A2B33'; border = '1px solid #2A2B33'; labelColor = '#8A8A93'; }
      if (s.status === 'current') { bg = '#6D5EF5'; border = '1px solid #6D5EF5'; labelColor = '#6D5EF5'; }
      const title = s.status === 'future' ? (s.name + ' — not started') : (s.name + (s.days != null ? (' — ' + s.days + ' day' + (s.days === 1 ? '' : 's')) : ''));
      return { bg, border, labelColor, short: STAGE_SHORT[i] || s.name, title };
    });
    return { segs, showLabels, barHeight };
  }
}

</script>
</body>
</html>
